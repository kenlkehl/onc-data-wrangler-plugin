project:
  name: example-synthetic-data
  input_paths:
    - /data1/ken/plugin_testing/onc-data-wrangler-plugin/example_synthetic_data/tables
    - /data1/ken/plugin_testing/onc-data-wrangler-plugin/example_synthetic_data/extractions
  output_dir: /data1/ken/plugin_testing/onc-data-wrangler-plugin/example_synthetic_data/output

cohort:
  patient_file: /data1/ken/plugin_testing/onc-data-wrangler-plugin/example_synthetic_data/extractions/extractions.parquet
  patient_id_column: patient_id
  diagnosis_file: /data1/ken/plugin_testing/onc-data-wrangler-plugin/example_synthetic_data/tables/encounters.csv
  diagnosis_code_column: diagnosis_code
  diagnosis_code_filter: []
  demographics_files:
    - /data1/ken/plugin_testing/onc-data-wrangler-plugin/example_synthetic_data/extractions/extractions.parquet
  column_mappings:
    sex: naaccr_sex_code
    race: race_ethnicity
    ethnicity: null
    birth_date: birth_year
    death_date: null

extraction:
  llm:
    provider: claude-code
    model: ""
    base_url: ""
  claude_code_model: opus
  ontology_ids:
    - generic_cancer
  cancer_type: generic
  notes_paths:
    - /data1/ken/plugin_testing/onc-data-wrangler-plugin/example_synthetic_data/notes.csv
  notes_text_column: text
  notes_date_column: date
  patient_id_column: patient_id

database:
  deidentify_dates: true
  record_id_prefix: patient
  min_non_missing: 10

query:
  privacy_mode: individual-allowed
  min_cell_size: 10
  max_query_rows: 500

field_mappings: {}
patient_id_columns: {}
