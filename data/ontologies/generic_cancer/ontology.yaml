id: generic_cancer
name: Generic Cancer
version: "1.1.0"
description: "Cancer-type-agnostic extraction fields covering both solid tumors and hematologic malignancies (diagnosis, biomarker, treatment, surgery, transplant, radiation, burden, social history)"
is_free_text: false

categories:
  - id: cancer_diagnosis
    name: Cancer Diagnosis
    description: >-
      Cancer diagnosis information. One entry per cancer diagnosis; recurrences
      or metastases do not count as a new diagnosis. Be very careful not to
      include non-cancer diagnoses.
    per_diagnosis: true
    items:
      - id: primary_site
        name: Primary Site
        description: >-
          Primary anatomical site of the cancer. For hematologic malignancies
          use: bone marrow (leukemia, myeloma), lymph nodes (lymphoma),
          blood (leukemia).
        data_type: string
        length: null
      - id: cancer_category
        name: Cancer Category
        description: "High-level classification: solid_tumor, leukemia, lymphoma, myeloma, or other_hematologic"
        data_type: string
        length: null
        valid_values:
          - code: "solid_tumor"
            description: "Solid tumor (carcinoma, sarcoma, melanoma, etc.)"
          - code: "leukemia"
            description: "Leukemia (ALL, AML, CLL, CML, etc.)"
          - code: "lymphoma"
            description: "Lymphoma (Hodgkin, non-Hodgkin, etc.)"
          - code: "myeloma"
            description: "Multiple myeloma / plasma cell neoplasm"
          - code: "other_hematologic"
            description: "Other hematologic malignancy (MDS, MPN, etc.)"
      - id: overall_stage_at_diagnosis
        name: Overall Stage at Diagnosis
        description: >-
          Overall cancer stage at time of diagnosis. For solid tumors use AJCC
          stage (e.g., I, IIA, IIIB, IV). For hematologic malignancies use
          the disease-specific staging system (see heme_staging_system and
          heme_stage fields).
        data_type: string
        length: null
      - id: t_stage_at_diagnosis
        name: T Stage at Diagnosis
        description: >-
          Tumor stage component at diagnosis (e.g., T2a, T3b). Leave blank
          for hematologic malignancies where TNM does not apply.
        data_type: string
        length: null
      - id: n_stage_at_diagnosis
        name: N Stage at Diagnosis
        description: >-
          Nodal stage component at diagnosis (e.g., N0, N1, N2, N3). Leave
          blank for hematologic malignancies where TNM does not apply (except
          lymphoma which may use Ann Arbor).
        data_type: string
        length: null
      - id: m_stage_at_diagnosis
        name: M Stage at Diagnosis
        description: >-
          Metastasis stage component at diagnosis (e.g., M0, M1a, M1b). Leave
          blank for hematologic malignancies where TNM does not apply.
        data_type: string
        length: null
      - id: heme_staging_system
        name: Hematologic Staging System
        description: >-
          Name of the staging/risk system used for hematologic malignancies.
          Only extract for leukemia, lymphoma, or myeloma. Examples: ISS,
          R-ISS, Durie-Salmon, Ann Arbor, Rai, Binet, ELN risk, IPSS,
          CNS-IPI, FLIPI, MIPI. Leave blank for solid tumors.
        data_type: string
        length: null
      - id: heme_stage
        name: Hematologic Stage/Risk
        description: >-
          Stage or risk group under the heme_staging_system. Examples:
          ISS III, R-ISS II, Durie-Salmon IIIA, Ann Arbor IVB, Rai 0,
          Binet A, ELN favorable, IPSS Low. Leave blank for solid tumors.
        data_type: string
        length: null
      - id: histology
        name: Histology
        description: >-
          Histological type of the cancer. For hematologic malignancies,
          include WHO classification and lineage (e.g., precursor B-cell ALL,
          IgG kappa multiple myeloma, diffuse large B-cell lymphoma).
        data_type: string
        length: null
      - id: diagnosis_date
        name: Diagnosis Date
        description: >-
          Date of cancer diagnosis. As specific as is known; if only year is
          indicated, list year; if month is indicated also, list month and year.
          Format YYYY-MM-DD when possible.
        data_type: date
        length: null

  - id: cancer_biomarker
    name: Cancer Biomarker
    description: >-
      Cancer biomarker testing results. Includes IHC, molecular/NGS, FISH,
      cytogenetics, flow cytometry immunophenotyping, serum tumor markers, and
      disease-specific labs. Note that EGFR should only refer to an EGFR
      mutation, not estimated GFR (which is kidney function). PSA refers to
      prostate-specific antigen testing for prostate cancer. For hematologic
      malignancies, extract flow cytometry markers (CD antigens), cytogenetic
      findings (karyotype, translocations like t(9;22)), FISH results,
      MRD status, serum markers (M-protein, free light chains, beta-2
      microglobulin, LDH), and blast percentage.
    per_diagnosis: true
    items:
      - id: biomarker_type
        name: Biomarker Type
        description: >-
          Type of biomarker assay. Use: mutation, rearrangement, expression,
          amplification, deletion, serum_marker, flow_cytometry,
          cytogenetics, fish, mrd, composite (for TMB, MSI, etc.)
        data_type: string
        length: null
      - id: biomarker_tested
        name: Biomarker Tested
        description: >-
          Name of the biomarker tested. For flow cytometry use CD marker names
          (e.g., CD19, CD34, TdT). For cytogenetics use the translocation or
          karyotype (e.g., t(9;22), del(17p)). For serum markers use the
          marker name (e.g., M-protein, free_light_chains, beta2_microglobulin,
          CA-125, CEA, PSA, LDH). For MRD use "MRD".
        data_type: string
        length: null
      - id: biomarker_result
        name: Biomarker Result
        description: >-
          Result of the biomarker test. Examples: positive, negative, 60%,
          L858R mutant, MSI-high, 2.6 g/dL, 85% blasts, MRD-negative,
          t(9;22) detected, kappa restricted, 10^-6 sensitivity.
        data_type: string
        length: null

  - id: cancer_systemic_therapy_regimen
    name: Cancer Systemic Therapy Regimen
    description: >-
      Systemic therapy regimens administered to the patient. Only extract
      regimens actually administered, not discussed options.
    per_diagnosis: true
    items:
      - id: regimen_drug_list
        name: Regimen Drug List
        description: "List of individual drug names in the regimen"
        data_type: string
        length: null
      - id: regimen_start_date
        name: Regimen Start Date
        description: "Start date of the regimen, as specific as is known. Format YYYY-MM-DD when possible."
        data_type: date
        length: null
      - id: regimen_end_date
        name: Regimen End Date
        description: "End date of the regimen, as specific as is known. Format YYYY-MM-DD when possible."
        data_type: date
        length: null
      - id: regimen_toxicity_list
        name: Regimen Toxicity List
        description: "List of individual toxicities experienced with this regimen"
        data_type: string
        length: null

  - id: cancer_surgery
    name: Cancer Surgery
    description: >-
      Cancer surgical procedures performed on the patient. For hematologic
      malignancies, include hematopoietic stem cell transplant (HSCT) here
      as well as in the dedicated transplant category.
    per_diagnosis: true
    items:
      - id: surgery_type
        name: Surgery Type
        description: >-
          Type of surgical procedure performed. For HSCT use:
          autologous_hsct, allogeneic_hsct, or cord_blood_transplant.
        data_type: string
        length: null
      - id: surgery_site
        name: Surgery Site
        description: "Anatomical site of surgery. For HSCT, use 'bone marrow' or 'peripheral blood stem cells'."
        data_type: string
        length: null
      - id: surgery_date
        name: Surgery Date
        description: "Date of surgery, as specific as is known. Format YYYY-MM-DD when possible."
        data_type: date
        length: null

  - id: hematopoietic_transplant
    name: Hematopoietic Stem Cell Transplant
    description: >-
      Details of hematopoietic stem cell transplant (HSCT). Only extract for
      patients who received HSCT (autologous or allogeneic). Leave this
      category empty for patients who did not receive transplant.
    per_diagnosis: true
    items:
      - id: transplant_type
        name: Transplant Type
        description: "autologous, allogeneic_matched_related, allogeneic_matched_unrelated, allogeneic_haploidentical, cord_blood"
        data_type: string
        length: null
      - id: conditioning_regimen
        name: Conditioning Regimen
        description: "Conditioning regimen drugs and intensity (e.g., high-dose melphalan 200 mg/m2, myeloablative Bu/Cy, reduced intensity Flu/Mel)"
        data_type: string
        length: null
      - id: transplant_date
        name: Transplant Date
        description: "Date of transplant (Day 0). Format YYYY-MM-DD when possible."
        data_type: date
        length: null
      - id: stem_cell_source
        name: Stem Cell Source
        description: "Source of stem cells: peripheral_blood, bone_marrow, cord_blood"
        data_type: string
        length: null
      - id: gvhd_acute
        name: Acute GVHD
        description: "Acute graft-versus-host disease occurrence and grade (e.g., Grade II skin/liver, none)"
        data_type: string
        length: null
      - id: gvhd_chronic
        name: Chronic GVHD
        description: "Chronic GVHD occurrence and severity (e.g., mild limited, moderate extensive, none)"
        data_type: string
        length: null
      - id: transplant_response
        name: Transplant Response
        description: "Best response after transplant (e.g., CR, sCR, VGPR, PR, MRD-negative)"
        data_type: string
        length: null

  - id: cancer_radiation_therapy
    name: Cancer Radiation Therapy
    description: "Radiation therapy courses administered to the patient."
    per_diagnosis: true
    items:
      - id: radiation_type
        name: Radiation Type
        description: "Type of radiation therapy (e.g., external_beam, SBRT, SRS, brachytherapy, proton)"
        data_type: string
        length: null
      - id: radiation_start_date
        name: Radiation Start Date
        description: "Start date of radiation therapy, as specific as is known. Format YYYY-MM-DD when possible."
        data_type: date
        length: null
      - id: radiation_end_date
        name: Radiation End Date
        description: "End date of radiation therapy, as specific as is known. Format YYYY-MM-DD when possible."
        data_type: date
        length: null
      - id: radiation_site
        name: Radiation Site
        description: "Anatomical site treated with radiation"
        data_type: string
        length: null

  - id: cancer_burden
    name: Cancer Burden
    description: >-
      Cancer burden and disease status assessments. Progression/worsening should
      only be called if the tumor is growing. If burden_type is cancer_site, add
      another cancer_site subfield to specify the location. For hematologic
      malignancies, use standardized response criteria: CR (complete remission),
      CRi (CR with incomplete count recovery), VGPR (very good partial
      response), PR (partial response), sCR (stringent complete response),
      MRD-negative, stable disease, progressive disease, relapse.
    per_diagnosis: true
    items:
      - id: burden_assessor_type
        name: Burden Assessor Type
        description: "Type of clinician making the assessment (e.g., radiologist, oncologist, hematologist, pathologist)"
        data_type: string
        length: null
      - id: burden_assessment_date
        name: Burden Assessment Date
        description: "Date of the burden assessment. Format YYYY-MM-DD when possible."
        data_type: date
        length: null
      - id: burden_type
        name: Burden Type
        description: "Type of burden assessment result"
        data_type: string
        length: null
        valid_values:
          - code: "response/improvement"
            description: "Response or improvement (includes CR, sCR, VGPR, PR, MRD-negative for heme)"
          - code: "progression/worsening"
            description: "Progression or worsening (includes relapse, refractory, rising M-protein for heme)"
          - code: "stable"
            description: "Stable disease / no change"
          - code: "cancer_site"
            description: "Cancer site indication"
      - id: burden_detail
        name: Burden Detail
        description: >-
          Specific response category or quantitative measure. For solid tumors:
          RECIST response (CR, PR, SD, PD), tumor size change. For heme:
          CR, CRi, sCR, VGPR, PR, MRD-negative (with sensitivity level),
          morphologic remission, molecular remission, blast percentage,
          M-protein level, free light chain ratio.
        data_type: string
        length: null
      - id: cancer_site
        name: Cancer Site
        description: "Location of cancer burden when burden_type is cancer_site"
        data_type: string
        length: null

  - id: social_history
    name: Social History
    description: "Patient social history relevant to cancer care, including smoking, alcohol, and substance use."
    per_diagnosis: true
    items:
      - id: categorical_smoking_history
        name: Categorical Smoking History
        description: "Categorical smoking status"
        data_type: string
        length: null
        valid_values:
          - code: "never"
            description: "Never smoker"
          - code: "former"
            description: "Former smoker"
          - code: "current"
            description: "Current smoker"
      - id: pack_years
        name: Pack Years
        description: "Smoking exposure in pack-years, extract whatever was documented"
        data_type: string
        length: null
      - id: alcohol_use
        name: Alcohol Use
        description: "Alcohol use status"
        data_type: string
        length: null
        valid_values:
          - code: "never"
            description: "Never"
          - code: "former"
            description: "Former"
          - code: "current"
            description: "Current"
          - code: "social"
            description: "Social"
      - id: substance_use
        name: Substance Use
        description: "Other substance use history as documented"
        data_type: string
        length: null
