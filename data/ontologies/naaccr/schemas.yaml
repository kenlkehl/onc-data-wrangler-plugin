# Site-specific extraction context for LLM prompts
site_context:
  breast: >-
    For breast cancer, extract:
    - ER (Estrogen Receptor) status: summary (positive/negative/borderline),
    percent positive (exact value if stated, e.g. 95%), Allred score (0-8).
    - PR (Progesterone Receptor) status: summary, percent positive, Allred score.
    - HER2 status: IHC score (0, 1+, 2+, 3+), ISH result (positive/negative,
    dual probe copy number and ratio, single probe copy number), overall summary.
    - Ki-67 proliferation index (percentage if stated).
    - Multigene signature: method (Oncotype Dx, MammaPrint, Prosigna/PAM50,
    EndoPredict, Breast Cancer Index), results/recurrence score, and risk category.
    - Oncotype Dx recurrence score (0-100) for both DCIS and invasive, with risk level.
    - Axillary lymph node involvement: number of positive nodes at Level I-II.
    - Response to neoadjuvant therapy if applicable.
    Receptor percentages should be exact values when available.

  prostate: >-
    For prostate cancer, extract:
    - Gleason patterns: both clinical and pathological. Record the two pattern numbers.
    - Gleason score: clinical and pathological (sum of patterns).
    - Gleason tertiary pattern if mentioned.
    - PSA lab value: most recent pre-treatment PSA in ng/mL.
    - Number of biopsy cores examined and number positive.
    - EOD prostate pathologic extension.
    Distinguish between clinical Gleason (biopsy) and pathological Gleason (prostatectomy).

  colon_rectum: >-
    For colorectal cancer, extract:
    - CEA: pretreatment lab value (ng/mL) and interpretation.
    - Circumferential resection margin (CRM): distance in mm.
    - Microsatellite instability (MSI): MSI-H/MSI-L/MSS.
    - KRAS mutation status.
    - Perineural invasion.
    - Tumor deposits: number of discrete tumor deposits.
    - Separate tumor nodules.

  lung: >-
    For lung cancer, extract:
    - ALK rearrangement: positive/negative.
    - EGFR mutations: specific mutations if stated.
    - KRAS mutation: specific mutation (e.g. G12C).
    - BRAF mutation: V600E or other.
    - PD-L1 expression: TPS percentage.
    - Spread through air spaces (STAS).
    - Visceral pleural invasion.
    - Separate tumor nodules.
    Record specific mutations, not just positive/negative.

  melanoma_skin: >-
    For cutaneous melanoma, extract:
    - Breslow tumor thickness: depth in mm.
    - Mitotic rate: number per mm2.
    - Ulceration: present or absent.

  kidney_renal_pelvis: >-
    For kidney/renal pelvis cancer, extract:
    - Sarcomatoid features: percentage or present/absent.

  bladder: >-
    For bladder cancer, extract:
    - Response to neoadjuvant therapy if given.
    Note whether muscle-invasive (T2+) vs non-muscle-invasive.

  thyroid: >-
    For thyroid cancer, extract:
    - Extranodal extension: clinical and pathological.

  cervix: >-
    For cervical cancer, extract:
    - FIGO stage.
    - p16 immunohistochemistry.

  ovary: >-
    For ovarian cancer, extract:
    - CA-125 pretreatment interpretation and lab value.
    - FIGO stage.
    - Residual tumor volume post cytoreduction.
    - Peritoneal cytology.

  testis: >-
    For testicular cancer, extract:
    - AFP: pre- and post-orchiectomy lab values and ranges.
    - hCG: pre- and post-orchiectomy lab values and ranges.
    - LDH: pre- and post-orchiectomy ranges.
    - S Category: clinical and pathological.

  liver: >-
    For liver cancer, extract:
    - AFP pretreatment interpretation and lab value.
    - Fibrosis score (Ishak score).

  pancreas: >-
    For pancreatic cancer, extract:
    - CA 19-9 pretreatment lab value in U/mL.

  head_neck: >-
    For head and neck cancer, extract:
    - Extranodal extension: clinical and pathological.
    - p16 status: important for oropharyngeal cancers.

  brain_cns: >-
    For brain/CNS tumors, extract:
    - Brain molecular markers: IDH1/IDH2, 1p/19q codeletion,
    MGMT methylation, ATRX loss, H3K27M.

  esophagus: >-
    For esophageal cancer, extract:
    - Extranodal extension.
    - Response to neoadjuvant therapy.
    Note Barrett's esophagus status and histologic subtype.

  stomach: >-
    For gastric cancer, extract:
    - Extranodal extension.
    - Microsatellite instability.
    Note HER2 status for advanced gastric cancer.

  uterus: >-
    For uterine/endometrial cancer, extract:
    - FIGO stage.
    Note histologic type and grade.

