project:
  name: evaluation
  input_paths:
    - evaluation/synthetic_output/tables
  output_dir: evaluation/database

cohort:
  patient_id_column: patient_id
  followup_date: "2026-01-01"
  id_prefix: patient

extraction:
  ontology_ids:
    - generic_cancer
  llm:
    provider: claude-code
  patient_id_column: patient_id
  notes_text_column: text
  notes_date_column: date
  notes_type_column: note_type
  notes_paths:
    - evaluation/synthetic_output/notes.csv

database:
  record_id_prefix: patient
  min_non_missing: 3
  deidentify_dates: false
  forbidden_output_columns:
    - record_id

query:
  privacy_mode: individual-allowed
  min_cell_size: 5
  max_query_rows: 500
  max_output_fraction: 0.5
